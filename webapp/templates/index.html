<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO26 检测平台</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI','Microsoft YaHei',sans-serif; background:#0b0f19; color:#e2e8f0; }
.topbar { background:#131924; border-bottom:1px solid #2a3550; padding:14px 20px; font-size:1.1em; font-weight:700; }
.topbar span { background:linear-gradient(135deg,#38bdf8,#818cf8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.layout { display:flex; height:calc(100vh - 53px); }
.sidebar { width:320px; background:#131924; border-right:1px solid #2a3550; padding:18px; overflow-y:auto; }
.sidebar h3 { font-size:0.82em; color:#38bdf8; margin:14px 0 8px; }
.main { flex:1; padding:24px; overflow-y:auto; }

.model-row { display:flex; align-items:center; gap:8px; padding:7px 10px; cursor:pointer; border-radius:6px; font-size:0.84em; }
.model-row:hover { background:#1a2235; }
.model-row input { accent-color:#38bdf8; }
.model-row .sz { color:#94a3b8; font-size:0.78em; margin-left:auto; }

.video-row { padding:8px 10px; cursor:pointer; border-radius:6px; font-size:0.84em; border:1px solid transparent; }
.video-row:hover { background:#1a2235; }
.video-row.sel { border-color:#38bdf8; background:rgba(56,189,248,0.08); }
.video-row .tag { font-size:0.72em; color:#94a3b8; }

.upload-zone { border:2px dashed #2a3550; border-radius:10px; padding:16px; text-align:center; cursor:pointer; margin-top:10px; }
.upload-zone:hover { border-color:#38bdf8; }
.upload-zone p { font-size:0.82em; color:#94a3b8; }

.ctrl { margin-bottom:10px; }
.ctrl label { display:block; font-size:0.78em; color:#94a3b8; margin-bottom:3px; }
.ctrl input, .ctrl select { width:100%; padding:7px 10px; border-radius:6px; border:1px solid #2a3550; background:#1a2235; color:#e2e8f0; font-size:0.84em; }
.ctrl-row { display:flex; gap:8px; }
.ctrl-row .ctrl { flex:1; }

.btn { width:100%; padding:11px; border:none; border-radius:8px; font-size:0.9em; font-weight:700; cursor:pointer; margin-top:8px; }
.btn-go { background:linear-gradient(135deg,#38bdf8,#818cf8); color:#fff; }
.btn-go:disabled { opacity:0.4; cursor:not-allowed; }

.progress-wrap { background:#1a2235; border-radius:20px; height:6px; margin:10px 0; overflow:hidden; display:none; }
.progress-bar { height:100%; border-radius:20px; background:linear-gradient(90deg,#38bdf8,#34d399); width:0; }
#progressText { font-size:0.78em; color:#94a3b8; }

.video-box { background:#000; border-radius:8px; margin-bottom:16px; overflow:hidden; }
.video-box video { width:100%; max-height:360px; }

.result-card { background:#1a2235; border:1px solid #2a3550; border-radius:10px; padding:18px; margin-bottom:14px; }
.result-card h3 { font-size:0.95em; color:#38bdf8; border-bottom:1px solid #2a3550; padding-bottom:8px; margin-bottom:10px; }
.result-card .row { display:flex; justify-content:space-between; padding:3px 0; font-size:0.84em; border-bottom:1px solid rgba(42,53,80,0.4); }
.result-card .row .val { font-weight:700; }
.result-card .out-video { margin-top:10px; border-radius:6px; overflow:hidden; background:#000; }
.result-card .out-video video { width:100%; max-height:260px; }

.bar-wrap { margin:3px 0; }
.bar-inner { display:flex; align-items:center; gap:8px; font-size:0.8em; }
.bar-label { width:90px; text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:16px; background:#0b0f19; border-radius:8px; overflow:hidden; }
.bar-fill { height:100%; border-radius:8px; display:flex; align-items:center; padding-left:6px; font-size:0.72em; font-weight:700; color:#0f172a; }

.toast { position:fixed; top:16px; right:16px; padding:10px 18px; border-radius:8px; z-index:999; font-size:0.84em; font-weight:600; display:none; }
.toast.ok { background:#34d399; color:#0f172a; }
.toast.err { background:#f87171; color:#fff; }

#errBox { display:none; background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.4); border-radius:8px; padding:14px; margin-bottom:14px; color:#f87171; font-family:Consolas,monospace; font-size:0.82em; white-space:pre-wrap; }
</style>
</head>
<body>

<div class="topbar"><span>YOLO26 视频检测平台</span></div>

<div class="toast" id="toast"></div>

<div class="layout">

<div class="sidebar">
<h3>MODELS</h3>
<div id="modelList">Loading...</div>

<h3>VIDEOS</h3>
<div id="videoList">Loading...</div>

<div class="upload-zone" onclick="document.getElementById('fileInput').click()">
    <p>Click to upload video<br>(MP4/AVI/MOV)</p>
</div>
<input type="file" id="fileInput" accept="video/*" style="display:none" onchange="uploadVideo()">

<h3>PARAMS</h3>
<div class="ctrl"><label>Confidence</label><input type="number" id="conf" value="0.25" step="0.05" min="0.05" max="0.95"></div>
<div class="ctrl"><label>IoU</label><input type="number" id="iou" value="0.7" step="0.05" min="0.1" max="0.95"></div>
<div class="ctrl"><label>Image Size</label><select id="imgSize"><option value="512">512</option><option value="640" selected>640</option><option value="768">768</option></select></div>

<button class="btn btn-go" id="runBtn" onclick="startDetection()">START DETECTION</button>
<div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
<div id="progressText"></div>

<h3>AI ANALYSIS</h3>
<div class="ctrl"><label>Provider</label>
    <select id="aiProvider" onchange="var l=document.getElementById('localNote');var k=document.getElementById('apiKey');if(this.value==='local'){k.style.display='none';if(l)l.style.display='block';}else{k.style.display='block';if(l)l.style.display='none';}">
        <option value="deepseek">DeepSeek</option>
        <option value="local">Qwen3-4B (Local)</option>
    </select>
</div>
<div id="localNote" style="display:none;font-size:0.75em;color:#34d399;margin-bottom:8px;">CPU推理，无需API Key</div>
<div class="ctrl" id="apiKeyWrap"><label>API Key</label><input type="password" id="apiKey" placeholder="sk-..."></div>
<div class="ctrl"><label>Model</label>
    <select id="aiModel">
        <option>deepseek-v4-flash</option>
        <option>deepseek-v4-pro</option>
    </select>
</div>
<div class="ctrl"><label>Prompt (optional)</label><input type="text" id="aiPrompt" placeholder="e.g. Which model is best?"></div>
<button class="btn btn-go" onclick="runAI()" style="background:linear-gradient(135deg,#818cf8,#f472b6);">AI ANALYZE</button>
<div id="aiResponse" style="display:none;margin-top:10px;padding:10px;background:#1a2235;border-radius:8px;font-size:0.82em;line-height:1.6;max-height:300px;overflow-y:auto;"></div>

</div>

<div class="main">
<div id="errBox"></div>
<div class="video-box" id="videoPreview">
    <div style="text-align:center;padding:80px;color:#94a3b8;">Select a video from the left panel</div>
</div>
<div id="resultGrid"></div>
</div>

</div>

<script>
// ─── Global Error Display ───
window.onerror = function(msg, url, line, col, err) {
    var el = document.getElementById('errBox');
    el.style.display = 'block';
    el.textContent = 'JS ERROR: ' + msg + ' (line ' + line + ')';
    return false;
};

// ─── State ───
var models = {};
var videos = [];
var selectedVideo = null;
var detectionResults = [];
var pollingTimer = null;
var COLORS = ['#38bdf8','#818cf8','#f472b6','#34d399','#fbbf24','#f87171'];

// ─── Toast ───
function toast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + (type || 'ok');
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 3000);
}

// ─── Init ───
function init() {
    fetch('/api/models').then(function(r) { return r.json(); }).then(function(d) {
        models = d;
        renderModels();
    }).catch(function(e) { document.getElementById('errBox').style.display='block'; document.getElementById('errBox').textContent='Failed to load models: '+e.message; });

    fetch('/api/videos').then(function(r) { return r.json(); }).then(function(d) {
        videos = d;
        renderVideos();
    }).catch(function(e) {});
}

function renderModels() {
    var el = document.getElementById('modelList');
    var folders = Object.keys(models);
    if (!folders.length) { el.innerHTML = '<p style="color:#94a3b8;font-size:0.82em;">No models found</p>'; return; }
    var h = '';
    for (var fi = 0; fi < folders.length; fi++) {
        var f = folders[fi];
        var info = models[f];
        h += '<div style="font-size:0.82em;font-weight:700;color:#818cf8;padding:4px 6px;">' + f + ' (' + info.count + ')</div>';
        for (var wi = 0; wi < info.weights.length; wi++) {
            var w = info.weights[wi];
            h += '<label class="model-row"><input type="checkbox" value="' + w.path + '"><span>' + w.name + '</span><span class="sz">' + w.size_mb + 'MB</span></label>';
        }
    }
    el.innerHTML = h;
}

function renderVideos() {
    var el = document.getElementById('videoList');
    if (!videos.length) { el.innerHTML = '<p style="color:#94a3b8;font-size:0.82em;">No videos</p>'; return; }
    var h = '';
    for (var vi = 0; vi < videos.length; vi++) {
        var v = videos[vi];
        var cls = (selectedVideo && selectedVideo.path === v.path) ? ' sel' : '';
        h += '<div class="video-row' + cls + '" data-idx="' + vi + '">' + v.name + '<div class="tag">' + v.size_mb + 'MB</div></div>';
    }
    el.innerHTML = h;
    // Add click handlers
    var rows = el.querySelectorAll('.video-row');
    for (var ri = 0; ri < rows.length; ri++) {
        rows[ri].addEventListener('click', function() {
            var idx = parseInt(this.getAttribute('data-idx'));
            selectVideo(videos[idx]);
        });
    }
}

function selectVideo(v) {
    selectedVideo = v;
    renderVideos();
    document.getElementById('videoPreview').innerHTML = '<video controls src="/video/' + v.name + '"><source src="/video/' + v.name + '"></video>';
}

function uploadVideo() {
    var file = document.getElementById('fileInput').files[0];
    if (!file) return;
    var form = new FormData();
    form.append('video', file);
    toast('Uploading...');
    fetch('/api/upload', { method:'POST', body:form }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.error) { toast(d.error, 'err'); return; }
        toast('Uploaded!', 'ok');
        return fetch('/api/videos');
    }).then(function(r) { return r.json(); }).then(function(d) {
        videos = d;
        renderVideos();
        if (videos.length) selectVideo(videos[videos.length - 1]);
    }).catch(function(e) { toast('Upload failed: ' + e.message, 'err'); });
}

// ─── Detection ───
function getCheckedModels() {
    var checks = document.querySelectorAll('#modelList input[type=checkbox]:checked');
    var paths = [];
    for (var i = 0; i < checks.length; i++) { paths.push(checks[i].value); }
    return paths;
}

function startDetection() {
    var modelPaths = getCheckedModels();
    if (!modelPaths.length) { toast('Select at least one model', 'err'); return; }
    if (!selectedVideo) { toast('Select a video first', 'err'); return; }

    var btn = document.getElementById('runBtn');
    btn.disabled = true;
    btn.textContent = 'RUNNING...';
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').textContent = 'Starting...';
    document.getElementById('resultGrid').innerHTML = '';
    document.getElementById('errBox').style.display = 'none';

    fetch('/api/detect', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            video_path: selectedVideo.path,
            model_paths: modelPaths,
            mode: document.getElementById('detectMode') ? document.getElementById('detectMode').value : 'detect',
            conf: parseFloat(document.getElementById('conf').value) || 0.25,
            iou: parseFloat(document.getElementById('iou').value) || 0.7,
            img_size: parseInt(document.getElementById('imgSize').value) || 640
        })
    }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.error) { toast(d.error, 'err'); resetBtn(); return; }
        pollTask(d.task_id);
    }).catch(function(e) {
        toast('Request failed: ' + e.message, 'err');
        resetBtn();
    });
}

function resetBtn() {
    var btn = document.getElementById('runBtn');
    btn.disabled = false;
    btn.textContent = 'START DETECTION';
    document.getElementById('progressWrap').style.display = 'none';
}

function pollTask(taskId) {
    fetch('/api/task/' + taskId).then(function(r) { return r.json(); }).then(function(task) {
        document.getElementById('progressBar').style.width = task.progress + '%';
        document.getElementById('progressText').textContent = 'Progress: ' + task.progress + '% | Status: ' + task.status;

        if (task.status === 'running') {
            pollingTimer = setTimeout(function() { pollTask(taskId); }, 2000);
        } else if (task.status === 'done') {
            resetBtn();
            document.getElementById('progressText').textContent = 'DONE!';
            showResults(task.results || []);
        } else {
            document.getElementById('progressText').textContent = 'Unknown status: ' + task.status;
            pollingTimer = setTimeout(function() { pollTask(taskId); }, 2000);
        }
    }).catch(function(e) {
        document.getElementById('progressText').textContent = 'Poll error: ' + e.message + ' (retrying...)';
        pollingTimer = setTimeout(function() { pollTask(taskId); }, 3000);
    });
}

// ─── Show Results ───
function showResults(results) {
    var grid = document.getElementById('resultGrid');
    var h = '';
    for (var i = 0; i < results.length; i++) {
        var r = results[i];
        if (r.error) {
            h += '<div class="result-card"><h3>ERROR: ' + (r.weight||r.model||'?') + '</h3><p style="color:#f87171;">' + r.error + '</p></div>';
            continue;
        }
        var vidTag = '';
        if (r.output_video_name) {
            vidTag = '<div class="out-video"><video controls src="/output/' + r.output_video_name + '"><source src="/output/' + r.output_video_name + '" type="video/mp4"></video></div>';
        }
        var dist = r.class_distribution || {};
        var clsKeys = Object.keys(dist);
        var maxCls = 1;
        for (var k = 0; k < clsKeys.length; k++) { if (dist[clsKeys[k]] > maxCls) maxCls = dist[clsKeys[k]]; }
        var bars = '';
        for (var k = 0; k < clsKeys.length; k++) {
            var key = clsKeys[k];
            var pct = maxCls > 0 ? (dist[key] / maxCls * 100) : 0;
            bars += '<div class="bar-wrap"><div class="bar-inner"><span class="bar-label">' + key + '</span><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + COLORS[k % COLORS.length] + ';">' + dist[key] + '</div></div></div></div>';
        }
        h += '<div class="result-card">' +
            '<h3>' + (r.weight||r.model||'?') + ' <span style="color:#94a3b8;font-weight:400;">(' + (r.model||'') + ')</span></h3>' +
            vidTag +
            '<div class="row"><span>Total Frames</span><span class="val">' + (r.total_frames||0) + '</span></div>' +
            '<div class="row"><span>Total Detections</span><span class="val">' + (r.total_detections||r.total_objects||0) + '</span></div>' +
            '<div class="row"><span>Avg Per Frame</span><span class="val" style="font-size:1.15em;color:#34d399;">' + (r.avg_per_frame||0) + '</span></div>' +
            '<div class="row"><span>Inference Time</span><span class="val">' + (r.infer_time_ms||0) + ' ms</span></div>' +
            '<div class="row"><span>FPS</span><span class="val">' + (r.fps||0) + '</span></div>' +
            '<div style="margin-top:8px;font-size:0.82em;color:#94a3b8;">Class Distribution:</div>' + bars +
            '</div>';
    }
    grid.innerHTML = h;
}

// ─── AI Analysis ───
function runAI() {
    var apiKey = document.getElementById('apiKey').value.trim();
    var provider = document.getElementById('aiProvider').value;
    if (provider !== 'local' && !apiKey) { toast('Please enter API Key', 'err'); return; }
    if (!detectionResults || !detectionResults.length) { toast('Run detection first', 'err'); return; }

    var respEl = document.getElementById('aiResponse');
    respEl.style.display = 'block';
    respEl.innerHTML = 'Analyzing...';

    var payload = {
        provider: provider,
        api_key: apiKey,
        model: document.getElementById('aiModel').value,
        results: detectionResults.map(function(d) {
            return {
                model: d.weight || d.model,
                total_objects: d.total_objects || d.total_detections,
                avg_per_frame: d.avg_per_frame,
                fps: d.fps,
                infer_time_ms: d.infer_time_ms,
                class_distribution: d.class_distribution,
            };
        }),
        prompt: document.getElementById('aiPrompt').value,
    };

    fetch('/api/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.error) { respEl.innerHTML = '<span style="color:#f87171;">Error: ' + d.error + '</span>'; return; }
        respEl.innerHTML = '<strong style="color:#818cf8;">AI (' + d.provider + '):</strong><br><br>' +
            d.content.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
    }).catch(function(e) {
        respEl.innerHTML = '<span style="color:#f87171;">Request failed: ' + e.message + '</span>';
    });
}

// ─── Start ───
init();
</script>
</body>
</html>
