<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat - Qwen3 4B</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#0b0f19;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.top{background:#131924;border-bottom:1px solid #2a3550;padding:12px 20px;display:flex;align-items:center;gap:12px}
.top h1{font-size:1.1em;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top select,.top input{background:#1a2235;border:1px solid #2a3550;color:#e2e8f0;padding:6px 10px;border-radius:6px;font-size:0.85em}
.msg-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:12px 16px;border-radius:12px;font-size:0.9em;line-height:1.6}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,#38bdf8,#818cf8)}
.msg.ai{align-self:flex-start;background:#1a2235;border:1px solid #2a3550}
.msg .role{font-size:0.75em;color:#94a3b8;margin-bottom:4px}
.input-area{background:#131924;border-top:1px solid #2a3550;padding:12px 20px;display:flex;gap:8px}
.input-area textarea{flex:1;background:#1a2235;border:1px solid #2a3550;color:#e2e8f0;padding:10px;border-radius:8px;font-size:0.9em;resize:none;height:60px}
.input-area button{padding:10px 20px;border:none;border-radius:8px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff}
.input-area button:disabled{opacity:0.4;cursor:not-allowed}
.status{font-size:0.8em;color:#94a3b8;padding:0 20px 8px}
.status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status .dot.on{background:#34d399}
.status .dot.off{background:#f87171}
</style>
</head>
<body>

<div class="top">
<h1>Qwen3 4B - 本地AI助手</h1>
<select id="provider" onchange="toggleKey()">
    <option value="local">Qwen3-4B (本地CPU)</option>
    <option value="deepseek">DeepSeek API</option>
</select>
<input type="password" id="apiKey" placeholder="DeepSeek API Key" style="display:none;width:200px">
<span class="status"><span class="dot on" id="dot"></span><span id="statusText">就绪</span></span>
</div>

<div class="msg-area" id="messages">
    <div class="msg ai">
        <div class="role">Qwen3-4B</div>
        你好！我是 Qwen3-4B，正运行在你的本地机器上。尽管问我任何问题！
    </div>
</div>

<div class="input-area">
    <textarea id="input" placeholder="输入消息... (Enter发送)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="sendBtn" onclick="send()">发送</button>
</div>

<script>
var chatHistory = [];

function toggleKey() {
    var p = document.getElementById('provider').value;
    document.getElementById('apiKey').style.display = p === 'deepseek' ? 'block' : 'none';
}

async function send() {
    var input = document.getElementById('input');
    var msg = input.value.trim();
    if (!msg) return;

    var provider = document.getElementById('provider').value;
    if (provider === 'deepseek' && !document.getElementById('apiKey').value.trim()) {
        alert('请输入 DeepSeek API Key');
        return;
    }

    input.value = '';
    addMsg('user', '你', msg);
    var btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = '思考中...';
    document.getElementById('statusText').textContent = '思考中...';

    var url = provider === 'local' ? '/api/chat' : '/api/analyze';

    try {
        var r;
        if (provider === 'local') {
            var msgs = chatHistory.concat([{role:'user',content:msg}]);
            r = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    model: 'qwen3-4b-local',
                    messages: msgs,
                    max_tokens: 1024,
                    temperature: 0.7,
                })
            });
        } else {
            r = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    provider: 'deepseek',
                    api_key: document.getElementById('apiKey').value.trim(),
                    model: 'deepseek-v4-flash',
                    results: [],
                    prompt: msg,
                })
            });
        }

        var d = await r.json();
        var reply = '';
        if (d.choices) reply = d.choices[0].message.content;
        else if (d.content) reply = d.content;
        else reply = JSON.stringify(d);

        chatHistory.push({role:'user',content:msg});
        chatHistory.push({role:'assistant',content:reply});
        if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

        addMsg('ai', provider === 'local' ? 'Qwen3-4B' : 'DeepSeek', reply);
        document.getElementById('statusText').textContent = '就绪';
    } catch(e) {
        addMsg('ai', '错误', '请求失败: ' + e.message);
        document.getElementById('statusText').textContent = '错误';
    }
    btn.disabled = false;
    btn.textContent = '发送';
}

function addMsg(type, role, text) {
    var div = document.createElement('div');
    div.className = 'msg ' + type;
    div.innerHTML = '<div class="role">' + role + '</div>' + text.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    document.getElementById('messages').appendChild(div);
    div.scrollIntoView({behavior:'smooth'});
}
</script>
</body></html>
