# Conda 环境配置 — YOLO26n 无人机目标检测
# 用法: conda env create -f environment.yml
# 兼容: Cloud Studio / Linux / Windows(WSL)

name: yolo26_uav
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - pip:
      - torch>=2.4.0
      - torchvision>=0.19.0
      - ultralytics>=8.4.0
      - opencv-python-headless>=4.9.0
      - numpy>=1.23.0
      - Pillow>=10.0.0
      - matplotlib>=3.7.0
      - seaborn>=0.12.0
      - tensorboard>=2.13.0
      - pyyaml>=6.0
      - tqdm>=4.65.0
      - pandas>=2.0.0
      - scipy>=1.11.0
      - psutil>=5.9.0
      - requests>=2.31.0
      - bypy>=1.8.9
