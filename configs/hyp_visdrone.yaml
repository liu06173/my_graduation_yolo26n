# YOLO26n hyperparameters optimized for VisDrone2019 UAV dataset
# Key considerations:
#   - Small targets: higher mosaic/mixup, multi-scale training
#   - UAV perspective: restricted flipud, stronger HSV
#   - 10 classes (pedestrian, car, van, truck, bus, motor, bicycle, etc.)

# ------------------- Training -------------------
model: yolo26n.pt           # pretrained YOLO26n weights (auto-download)
data: configs/visdrone.yaml # dataset config
epochs: 100                 # total training epochs (reduced: overfitting started at epoch 4-6)
patience: 15                # early stopping patience (reduced: stop sooner on overfitting)
batch: 32                   # batch size per GPU (2x→halve iterations; more stable gradients)
imgsz: 512                  # input image size (512²=36% less compute vs 640, enables batch×2)
optimizer: MuSGD            # YOLO26 MuSGD optimizer
lr0: 0.003                  # initial learning rate (reduced: small model needs lower LR)
lrf: 0.001                  # final learning rate = lr0 * lrf (much lower final LR for stability)
momentum: 0.937             # SGD momentum
weight_decay: 0.001         # optimizer weight decay (increased L2 regularization)
warmup_epochs: 3.0          # warmup epochs (shorter: less overhead)
warmup_momentum: 0.8        # warmup initial momentum
warmup_bias_lr: 0.1         # warmup initial bias lr

# ------------------- Augmentation -------------------
# UAV-specific augmentation strategy (trimmed for speed while keeping small-object gains)
hsv_h: 0.03                 # hue augmentation
hsv_s: 0.7                  # saturation (slightly reduced)
hsv_v: 0.5                  # value/brightness (slightly reduced)
degrees: 10.0               # rotation (+/- deg) - reduced for speed
translate: 0.15             # translation (+/- fraction, reduced)
scale: 0.5                  # scale gain (+/- gain) - reduced for speed
shear: 1.0                  # shear (+/- deg, reduced)
perspective: 0.0            # perspective (DISABLED: expensive, marginal UAV benefit)
flipud: 0.0                 # upside-down flip probability (DISABLED for UAV)
fliplr: 0.5                 # left-right flip probability
mosaic: 0.8                 # mosaic probability (slightly reduced: save 20% mosaic overhead)
mixup: 0.1                  # mixup probability (slightly reduced)
copy_paste: 0.1             # segment copy-paste (slightly reduced)

# ------------------- Loss -------------------
box: 5.0                    # box loss weight (reduced: prevents over-fitting to localization)
cls: 0.7                    # cls loss weight (increased: better classification signal)
dfl: 1.5                    # dfl loss weight

# ------------------- Validation -------------------
val: True                   # validate during training
save_period: 5              # save checkpoint every N epochs (more frequent saves)
plots: True                 # save plots during training
close_mosaic: 10            # disable mosaic augmentation for last N epochs (longer finetuning)

# ------------------- Advanced -------------------
device: 0                   # GPU device (0,1,2,3 or cpu)
workers: 12                 # dataloader workers per GPU (increased: better CPU→GPU pipeline)
cache: True                 # cache images in RAM (~12GB for VisDrone at 512 res, 30s preload)
rect: True                  # rectangular training (minimal padding, less wasted compute)
cos_lr: True                # cosine LR scheduler
label_smoothing: 0.1        # label smoothing (prevents classifier overconfidence)
nbs: 64                     # nominal batch size
overlap_mask: True          # mask overlap during training
mask_ratio: 4               # mask downsample ratio
dropout: 0.1                # dropout rate (add regularization, reduce overfitting)
seed: 42                    # random seed
single_cls: False           # train as single-class
fraction: 0.4               # fraction of dataset to use (further reduced for faster epochs)
profile: False              # profile ONNX and TensorRT speeds
freeze: null                # freeze first N layers (null=no freeze)
